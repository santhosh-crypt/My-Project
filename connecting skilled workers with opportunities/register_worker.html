<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Worker | Skill Connect</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;

            /* Professional Job Background */
            background: linear-gradient(
                rgba(0, 0, 0, 0.55),
                rgba(0, 0, 0, 0.55)
            ),
            url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Glass Card */
        .card {
            width: 380px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            transform: perspective(1000px) rotateX(5deg);
            transition: transform 0.4s;
            color: white;
        }

        .card:hover {
            transform: perspective(1000px) rotateX(0deg);
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        /* 3D Button */
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0056b3;
            transition: all 0.2s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #0056b3, #0096c7);
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0056b3;
        }

        .note {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="card">
    <form method="post">
        <h3>👷 Worker Registration</h3>

        <input name="name" placeholder="Full Name" required>
        <input name="skill" placeholder="Skill (Electrician, Plumber…)" required>
        <input name="location" placeholder="Location" required>
        <input name="contact" placeholder="Contact Number" required>

        <button type="submit">Register</button>

        <div class="note">
            Join & find the right job opportunities
        </div>
    </form>
</div>

</body>
</html>
