<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Jobs Table</title>
<style>
  /* 3D Animated Background */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff512f, #f09819);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  h3 {
    text-align: center;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }

  table {
    border-collapse: collapse;
    width: 80%;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  th, td {
    padding: 15px;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }

  th {
    background: #2575fc;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  tr:hover {
    background: #f0f0f0;
    transform: translateZ(10px);
    transition: all 0.3s ease;
  }

  /* 3D Button Style */
  .btn {
    display: inline-block;
    padding: 10px 25px;
    margin: 20px auto;
    background: #6a11cb;
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    border-radius: 12px;
    box-shadow: 0 6px #4b0fa8, 0 0 20px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 12px #4b0fa8, 0 0 30px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<div>
  <h3>Available Jobs</h3>
  <table border="1">
    <tr><th>Title</th><th>Skill</th><th>Location</th><th>Contact</th></tr>
    {% for j in jobs %}
    <tr>
      <td>{{j[1]}}</td>
      <td>{{j[2]}}</td>
      <td>{{j[3]}}</td>
      <td>{{j[4]}}</td>
    </tr>
    {% endfor %}
  </table>
  
  <a href="#" class="btn">Apply Now</a>
</div>

</body>
</html>
