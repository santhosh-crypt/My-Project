<!DOCTYPE html>
<html>
<head>
    <title>Skilled Workers</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1c1c1c, #434343);
            color: white;
            padding: 40px;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            color: black;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
            transform: scale(1.01);
        }
    </style>
</head>

<body>

<h3>👥 Skilled Workers</h3>

<table>
<tr>
    <th>Name</th>
    <th>Skill</th>
    <th>Location</th>
    <th>Contact</th>
</tr>

{% for w in workers %}
<tr>
    <td>{{ w[1] }}</td>
    <td>{{ w[2] }}</td>
    <td>{{ w[3] }}</td>
    <td>{{ w[4] }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
